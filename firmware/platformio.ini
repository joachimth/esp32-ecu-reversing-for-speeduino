[env:esp32c5]
# pioarduino er en community-vedligeholdt fork af espressif32 med
# opdateret arduino-esp32 (3.1.0+) der inkluderer ESP32-C5 support.
# Den officielle PlatformIO-platform (espressif32@7.0.1) mangler C5.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c5-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 460800
board_build.filesystem = littlefs
board_build.partitions = min_spiffs.csv
lib_deps =
    mathieucarbou/ESPAsyncWebServer @ ^3.3.0
    mathieucarbou/AsyncTCP @ ^3.3.0
    olikraus/U8g2 @ ^2.35.30
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
