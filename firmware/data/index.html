<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ignition Logger</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 16px}
header{width:100%;max-width:560px;display:flex;justify-content:space-between;
  align-items:center;margin-bottom:24px}
h1{font-size:1.25rem;font-weight:700;color:#ff8c00;letter-spacing:.02em}
#dot{width:10px;height:10px;border-radius:50%;background:#333;
  transition:background .3s;flex-shrink:0}
#dot.ok{background:#4caf50;box-shadow:0 0 8px #4caf5066}
#dot.err{background:#f44336}
#status{font-size:.75rem;color:#555;margin-right:8px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:560px}
.card{background:#161616;border:1px solid #222;border-radius:14px;padding:18px 16px;
  text-align:center}
.card label{font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;
  color:#555;display:block;margin-bottom:8px}
.card .val{font-size:2.6rem;font-weight:800;line-height:1;color:#ff8c00;
  font-variant-numeric:tabular-nums;transition:color .2s}
.card .unit{font-size:.7rem;color:#444;margin-top:5px}
.card.sync .val{color:#555}
.card.sync .val.ok{color:#4caf50}
.card.sync .val.nok{color:#f44336}
.tooth-wrap{margin-top:12px;width:100%;max-width:560px;
  background:#161616;border:1px solid #222;border-radius:14px;padding:16px}
.tooth-wrap label{font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;
  color:#555;display:block;margin-bottom:10px}
.bar-bg{height:10px;background:#1e1e1e;border-radius:5px;overflow:hidden}
.bar{height:100%;width:0%;background:linear-gradient(90deg,#ff8c00,#ffb347);
  border-radius:5px;transition:width .15s}
.tooth-val{font-size:.75rem;color:#444;margin-top:6px;text-align:right}
.info{margin-top:20px;width:100%;max-width:560px;
  background:#161616;border:1px solid #222;border-radius:14px;padding:14px 16px;
  font-size:.75rem;color:#444;line-height:1.9}
.info span{color:#666}
footer{margin-top:20px;font-size:.7rem;color:#333}
footer a{color:#555;text-decoration:none}
footer a:hover{color:#888}
@media(max-width:360px){.card .val{font-size:2rem}}
</style>
</head>
<body>

<header>
  <h1>Ignition Logger</h1>
  <div style="display:flex;align-items:center;gap:8px">
    <span id="status">Forbinder...</span>
    <span id="dot"></span>
  </div>
</header>

<div class="grid">
  <div class="card">
    <label>RPM</label>
    <div class="val" id="rpm">—</div>
    <div class="unit">omdrejninger/min</div>
  </div>
  <div class="card">
    <label>Advance</label>
    <div class="val" id="adv">—</div>
    <div class="unit">° BTDC</div>
  </div>
  <div class="card">
    <label>Dwell</label>
    <div class="val" id="dwell">—</div>
    <div class="unit">ms</div>
  </div>
  <div class="card sync">
    <label>Sync</label>
    <div class="val" id="sync">—</div>
    <div class="unit">missing tooth lock</div>
  </div>
</div>

<div class="tooth-wrap">
  <label>Tand position  (0 – 35)</label>
  <div class="bar-bg"><div class="bar" id="bar"></div></div>
  <div class="tooth-val" id="tooth-val">—</div>
</div>

<div class="info">
  <span>WiFi:</span> IgnLogger / ignition1 &nbsp;|&nbsp;
  <span>IP:</span> 192.168.4.1 &nbsp;|&nbsp;
  <span>Cal:</span> Tryk GPIO0 ved idle
</div>

<footer>
  <a href="/update">OTA firmware update &#8594;</a>
</footer>

<script>
const $ = id => document.getElementById(id);
const statusEl = $('status');
const dotEl    = $('dot');
let ws, retryT;

function setConn(ok) {
  statusEl.textContent = ok ? 'Forbundet' : 'Afbrudt – forsøger igen...';
  dotEl.className = ok ? 'ok' : 'err';
}

function connect() {
  clearTimeout(retryT);
  ws = new WebSocket('ws://' + location.host + '/ws');

  ws.onopen  = () => setConn(true);
  ws.onerror = () => ws.close();
  ws.onclose = () => {
    setConn(false);
    retryT = setTimeout(connect, 2000);
  };

  ws.onmessage = e => {
    // format: RPM,ADV,DWELL,TOOTH.FRAC,SYNC
    const p = e.data.split(',');
    if (p.length < 5) return;

    const rpm   = parseFloat(p[0]);
    const adv   = parseFloat(p[1]);
    const dwell = parseFloat(p[2]);
    const tooth = parseFloat(p[3]);   // e.g. 20.51
    const sync  = parseInt(p[4]) === 1;

    $('rpm').textContent   = rpm.toFixed(0);
    $('adv').textContent   = adv.toFixed(1);
    $('dwell').textContent = dwell.toFixed(2);

    const syncEl = $('sync');
    syncEl.textContent = sync ? 'OK' : 'NEJ';
    syncEl.className   = 'val ' + (sync ? 'ok' : 'nok');

    const pct = Math.min((Math.floor(tooth) / 35) * 100, 100);
    $('bar').style.width    = pct + '%';
    $('tooth-val').textContent = 'Tand ' + p[3] + ' / 35';
  };
}

connect();
</script>
</body>
</html>
