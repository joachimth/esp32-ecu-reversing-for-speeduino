name: Build, Deploy & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# ─────────────────────────────────────────────────────────────────────────────
# Job 1 – byg firmware + LittleFS, gem som artifact
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('firmware/platformio.ini') }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build firmware
        run: cd firmware && pio run -e esp32c5

      - name: Build LittleFS image
        run: cd firmware && pio run -e esp32c5 -t buildfs

      - name: Gather binaries
        run: |
          mkdir -p release
          cp firmware/.pio/build/esp32c5/firmware.bin   release/
          cp firmware/.pio/build/esp32c5/partitions.bin release/
          cp firmware/.pio/build/esp32c5/bootloader.bin release/
          cp firmware/.pio/build/esp32c5/littlefs.bin   release/
          BOOT_APP=$(find ~/.platformio -name "boot_app0.bin" 2>/dev/null | head -1)
          if [ -z "$BOOT_APP" ]; then echo "ERROR: boot_app0.bin not found" && exit 1; fi
          cp "$BOOT_APP" release/boot_app0.bin
          echo "=== release/ ===" && ls -lh release/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v6
        with:
          name: ignition-logger-firmware
          path: release/
          retention-days: 90

# ─────────────────────────────────────────────────────────────────────────────
# Job 2 – deploy docs/ + firmware-binaries til GitHub Pages
# manifest.json bruger relative stier (firmware/*.bin) → ingen CORS-problemer
# ─────────────────────────────────────────────────────────────────────────────
  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6

      - name: Download firmware artifact
        uses: actions/download-artifact@v6
        with:
          name: ignition-logger-firmware
          path: firmware-bins/

      - name: Bundle docs + firmware til Pages
        run: |
          mkdir -p pages-bundle/firmware
          cp -r docs/. pages-bundle/
          cp firmware-bins/* pages-bundle/firmware/
          echo "=== pages-bundle/ ===" && ls -lh pages-bundle/ pages-bundle/firmware/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: pages-bundle/

      - uses: actions/deploy-pages@v4
        id: deploy

# ─────────────────────────────────────────────────────────────────────────────
# Job 3 – automatisk "latest" release ved hvert push til main
# Overskriver den forrige latest-release med nye binaries.
# Web flasher manifest peger på releases/latest/download/ → virker altid.
# ─────────────────────────────────────────────────────────────────────────────
  auto-release:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v6
        with:
          name: ignition-logger-firmware
          path: release/

      - name: Publish rolling 'latest' release
        run: |
          SHA="${{ github.sha }}"
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest release/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "Latest Build" \
            --notes "Automatisk bygget fra main (${SHA:0:7}). Flash via webflasheren på GitHub Pages." \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ─────────────────────────────────────────────────────────────────────────────
# Job 4 – navngivet release med changelog (kun ved tag-push: v*)
# ─────────────────────────────────────────────────────────────────────────────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v6
        with:
          name: ignition-logger-firmware
          path: release/

      - uses: softprops/action-gh-release@v3
        with:
          files: release/*
          generate_release_notes: true
          make_latest: true
