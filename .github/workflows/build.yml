name: Build, Deploy & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

# ─────────────────────────────────────────────────────────────────────────────
# Job 1 – byg firmware + LittleFS, gem som artifact
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('firmware/platformio.ini') }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build firmware
        run: cd firmware && pio run -e esp32dev

      - name: Build LittleFS image
        run: cd firmware && pio run -e esp32dev -t buildfs

      - name: Gather binaries
        run: |
          mkdir -p release
          cp firmware/.pio/build/esp32dev/firmware.bin   release/
          cp firmware/.pio/build/esp32dev/partitions.bin release/
          cp firmware/.pio/build/esp32dev/bootloader.bin release/
          cp firmware/.pio/build/esp32dev/littlefs.bin   release/
          BOOT_APP=$(find ~/.platformio -name "boot_app0.bin" 2>/dev/null | head -1)
          if [ -z "$BOOT_APP" ]; then echo "ERROR: boot_app0.bin not found" && exit 1; fi
          cp "$BOOT_APP" release/boot_app0.bin
          echo "=== release/ ===" && ls -lh release/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ignition-logger-firmware
          path: release/
          retention-days: 90

# ─────────────────────────────────────────────────────────────────────────────
# Job 2 – deploy docs/ til GitHub Pages (kører ved hvert push til main + tags)
# ─────────────────────────────────────────────────────────────────────────────
  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - uses: actions/deploy-pages@v4
        id: deploy

# ─────────────────────────────────────────────────────────────────────────────
# Job 3 – opret GitHub Release med binaries (kun ved tag-push: v*)
# ─────────────────────────────────────────────────────────────────────────────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ignition-logger-firmware
          path: release/

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
